<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoFarma - Red de Logística Solidaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --bg: #0b0f12; --card: #1a1f24; --text: #ffffff; --text-dim: #a0aec0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; text-align: center; }
        .logo { width: 80px; margin-bottom: 20px; border-radius: 50%; border: 2px solid var(--primary); }
        h1 { font-weight: 800; font-size: 1.8rem; margin: 0; letter-spacing: -0.05em; }
        .subtitle { color: var(--text-dim); margin: 10px 0 30px; font-size: 0.95rem; }

        .selector { display: flex; flex-direction: column; gap: 12px; }
        .btn-perfil {
            background: var(--card); border: 1px solid #333; color: white; padding: 18px;
            border-radius: 12px; text-align: left; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .btn-perfil:hover { border-color: var(--primary); transform: translateY(-2px); }
        .btn-perfil strong { font-size: 1.05rem; }
        .btn-perfil span { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }
        .destacado { border-left: 4px solid var(--primary); }
        .inversor-btn { margin-top: 30px; border: 1px dashed #444; opacity: 0.8; }

        .form-container { display: none; background: var(--card); padding: 25px; border-radius: 16px; text-align: left; animation: fadeIn 0.4s ease; }
        label { display: block; font-size: 0.85rem; color: var(--primary); margin-bottom: 5px; }
        input, textarea {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #2d3748; 
            border: 1px solid #4a5568; border-radius: 8px; color: white; box-sizing: border-box;
        }
        .submit-btn {
            width: 100%; background: var(--primary); color: #000; padding: 15px; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .back { display: block; margin-top: 20px; color: var(--text-dim); text-decoration: none; text-align: center; font-size: 0.9rem; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="inicio">
        <img src="logo.png" alt="NexoFarma" class="logo">
        <h1>NexoFarma</h1>
        <p class="subtitle">Validando la red logística de salud en Chilecito.</p>

        <div class="selector">
            <button class="btn-perfil destacado" onclick="renderForm('donante')">
                <strong>Tengo medicamentos para donar</strong>
                <span>Sumate a la red de ayuda.</span>
            </button>
            <button class="btn-perfil" onclick="renderForm('beneficiario')">
                <strong>Necesito medicación</strong>
                <span>Asistencia para completar tratamientos.</span>
            </button>
            <button class="btn-perfil" onclick="renderForm('farmacia')">
                <strong>Soy Farmacia / Centro de Salud</strong>
                <span>Nodo de validación y entrega.</span>
            </button>
            <button class="btn-perfil inversor-btn" onclick="renderForm('inversor')">
                <strong>Acceso Inversores & Partners</strong>
                <span>Ver Pitch Deck y Data Room (Requiere NDA).</span>
            </button>
        </div>
    </div>

    <div id="form-box" class="form-container">
        <h3 id="form-title" style="margin-top:0"></h3>
        <form id="dynamic-form" onsubmit="enviarLead(event)">
            <input type="hidden" name="tipo_lead" id="tipo_lead">
            
            <label>Nombre Completo</label>
            <input type="text" name="name" required>

            <label>WhatsApp / Teléfono</label>
            <input type="tel" name="phone" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <div id="campos-especificos"></div>

            <button type="submit" class="submit-btn" id="btn-text">Enviar</button>
            <a href="#" class="back" onclick="location.reload()">← Volver</a>
        </form>
    </div>
</div>

<script>
    function renderForm(tipo) {
        document.getElementById('inicio').style.display = 'none';
        document.getElementById('form-box').style.display = 'block';
        document.getElementById('tipo_lead').value = tipo;
        
        const espec = document.getElementById('campos-especificos');
        const title = document.getElementById('form-title');
        const btn = document.getElementById('btn-text');

        espec.innerHTML = ''; 

        if(tipo === 'donante') {
            title.innerText = 'Registro de Donante';
            espec.innerHTML = `<label>Medicamentos (Nombre y Vencimiento)</label><textarea name="message" rows="3" required></textarea>`;
            btn.innerText = 'Sumarme como Donante';
        } else if(tipo === 'beneficiario') {
            title.innerText = 'Solicitud de Ayuda';
            espec.innerHTML = `<label>¿Qué medicamento buscás?</label><input type="text" name="message" required>`;
            btn.innerText = 'Solicitar Asistencia';
        } else if(tipo === 'farmacia') {
            title.innerText = 'Alianza Institucional';
            espec.innerHTML = `<label>Ubicación / Barrio</label><input type="text" name="message" required>`;
            btn.innerText = 'Postular mi Farmacia';
        } else {
            title.innerText = 'Acceso Inversores';
            espec.innerHTML = `<label>Institución / Fondo</label><input type="text" name="message" placeholder="Opcional">`;
            btn.innerText = 'Continuar al Pitch';
        }
    }

    async function enviarLead(event) {
        event.preventDefault();
        const btn = document.getElementById('btn-text');
        btn.innerText = 'Procesando...';
        btn.disabled = true;

        const formData = new FormData(event.target);
        const tipo = document.getElementById('tipo_lead').value;

        try {
            // URL a tu Alwaysdata
            const response = await fetch('https://nexofarma.alwaysdata.net/email/procesar_lead.php', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.status === 'success') {
                if (tipo === 'inversor') {
                    // REDIRECCIÓN CORRECTA AL FLUJO DE INVERSIÓN
                    window.location.href = 'inversores.html';
                } else {
                    alert('¡Recibido! Te contactaremos pronto.');
                    location.reload();
                }
            } else {
                alert('Error del servidor: ' + result.message);
            }
        } catch (error) {
            alert('Error de conexión.');
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
