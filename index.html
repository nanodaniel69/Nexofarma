<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoFarma - Red de Logística Solidaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00ffcc; 
            --bg: #080E1A; 
            --surface: #0E1729;
            --card: #1a1f24; 
            --text: #ffffff; 
            --text-dim: #a0aec0;
            --teal: #2DD4BF;
            --sky: #38BDF8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        #nexoCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .container { 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            position: relative;
            z-index: 1;
        }
        
        .logo { 
            width: 80px; 
            margin-bottom: 20px; 
            border-radius: 50%; 
            border: 2px solid var(--primary); 
            filter: drop-shadow(0 0 15px rgba(45,212,191,0.4));
        }
        
        h1 { 
            font-weight: 800; 
            font-size: 1.8rem; 
            margin: 0; 
            letter-spacing: -0.05em; 
            margin-bottom: 10px;
        }
        
        .subtitle { 
            color: var(--text-dim); 
            margin: 0 0 30px; 
            font-size: 0.95rem; 
            line-height: 1.4;
        }

        .selector { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        .btn-perfil {
            background: var(--surface); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            padding: 18px;
            border-radius: 12px; 
            text-align: left; 
            cursor: pointer; 
            transition: all 0.3s;
            display: flex; 
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        .btn-perfil::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(45,212,191,0.1), rgba(56,189,248,0.1));
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .btn-perfil:hover::before {
            opacity: 1;
        }
        
        .btn-perfil:hover { 
            border-color: var(--primary); 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px -5px rgba(45,212,191,0.3);
        }
        
        .btn-perfil strong { 
            font-size: 1.05rem; 
            position: relative;
            z-index: 1;
        }
        
        .btn-perfil span { 
            font-size: 0.8rem; 
            color: var(--text-dim); 
            margin-top: 4px; 
            position: relative;
            z-index: 1;
        }
        
        .destacado { 
            border-left: 4px solid var(--primary); 
            background: rgba(45,212,191,0.05);
        }
        
        .inversor-btn { 
            margin-top: 30px; 
            border: 1px dashed rgba(255,255,255,0.2); 
            opacity: 0.9; 
        }
        
        .inversor-btn:hover {
            opacity: 1;
            border-color: var(--primary);
        }

        .form-container { 
            display: none; 
            background: var(--surface); 
            padding: 30px; 
            border-radius: 16px; 
            text-align: left; 
            animation: fadeIn 0.4s ease;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 1;
        }
        
        label { 
            display: block; 
            font-size: 0.85rem; 
            color: var(--primary); 
            margin-bottom: 8px; 
            font-weight: 600;
        }
        
        input, textarea {
            width: 100%; 
            padding: 14px; 
            margin-bottom: 20px; 
            background: rgba(8,14,26,0.8); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px; 
            color: white; 
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .submit-btn {
            width: 100%; 
            background: linear-gradient(135deg, var(--primary), var(--sky)); 
            color: var(--bg); 
            padding: 16px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px var(--primary);
        }
        
        .back { 
            display: block; 
            margin-top: 20px; 
            color: var(--text-dim); 
            text-decoration: none; 
            text-align: center; 
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        
        .back:hover {
            color: var(--primary);
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .container {
                max-width: 100%;
            }
            
            .form-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <canvas id="nexoCanvas"></canvas>

    <div class="container">
        <div id="inicio">
            <img src="logo.png" alt="NexoFarma" class="logo">
            <h1>NexoFarma</h1>
            <p class="subtitle">Validando la red logística de salud en Chilecito.</p>

            <div class="selector">
                <button class="btn-perfil destacado" onclick="renderForm('donante')">
                    <strong>Tengo medicamentos para donar</strong>
                    <span>Sumate a la red de ayuda.</span>
                </button>
                <button class="btn-perfil" onclick="renderForm('beneficiario')">
                    <strong>Necesito medicación</strong>
                    <span>Asistencia para completar tratamientos.</span>
                </button>
                <button class="btn-perfil" onclick="renderForm('farmacia')">
                    <strong>Soy Farmacia / Centro de Salud</strong>
                    <span>Nodo de validación y entrega.</span>
                </button>
                
                <button class="btn-perfil inversor-btn" onclick="window.location.href='inversores.html'">
                    <strong>Acceso Inversores & Partners</strong>
                    <span>Ver Pitch Deck y Data Room (Requiere NDA).</span>
                </button>
            </div>
        </div>

        <div id="form-box" class="form-container">
            <h3 id="form-title" style="margin-top:0"></h3>
            <form id="dynamic-form" onsubmit="enviarLead(event)">
                <input type="hidden" name="tipo_lead" id="tipo_lead">
                
                <label>Nombre Completo</label>
                <input type="text" name="name" required>

                <label>WhatsApp / Teléfono</label>
                <input type="tel" name="phone" required>

                <label>Email</label>
                <input type="email" name="email" required>

                <div id="campos-especificos"></div>

                <button type="submit" class="submit-btn" id="btn-text">Enviar</button>
                <a href="#" class="back" onclick="location.reload()">← Volver</a>
            </form>
        </div>
    </div>

<script>
    // Canvas Partículas Dinámico (Mismo que inversores.html)
    (function(){
        const canvas = document.getElementById('nexoCanvas');
        const ctx = canvas.getContext('2d');
        let atoms = [];
        
        function init(){
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
            atoms = [];
            const n = window.innerWidth < 768 ? 40 : 80;
            for(let i=0; i<n; i++){
                atoms.push({
                    x: Math.random()*canvas.width, 
                    y: Math.random()*canvas.height, 
                    vx: (Math.random()-0.5)*0.4, 
                    vy: (Math.random()-0.5)*0.4
                });
            }
        }
        
        function draw(){
            ctx.clearRect(0,0,canvas.width, canvas.height);
            
            // Fondo oscuro
            ctx.fillStyle = '#080E1A';
            ctx.fillRect(0,0, canvas.width, canvas.height);
            
            atoms.forEach((a, i) => {
                a.x += a.vx; 
                a.y += a.vy;
                if(a.x<0 || a.x>canvas.width) a.vx*=-1; 
                if(a.y<0 || a.y>canvas.height) a.vy*=-1;
                
                // Partículas teal
                ctx.fillStyle = 'rgba(45, 212, 191, 0.4)';
                ctx.beginPath(); 
                ctx.arc(a.x, a.y, 1.5, 0, Math.PI*2); 
                ctx.fill();
                
                // Conexiones
                for(let j=i+1; j<atoms.length; j++){
                    const d = Math.hypot(a.x-atoms[j].x, a.y-atoms[j].y);
                    if(d < 150){
                        ctx.strokeStyle = `rgba(56, 189, 248, ${0.2 - d/750})`;
                        ctx.lineWidth = 0.5; 
                        ctx.beginPath(); 
                        ctx.moveTo(a.x, a.y); 
                        ctx.lineTo(atoms[j].x, atoms[j].y); 
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }
        
        window.addEventListener('resize', init); 
        init(); 
        draw();
    })();

    function renderForm(tipo) {
        document.getElementById('inicio').style.display = 'none';
        document.getElementById('form-box').style.display = 'block';
        document.getElementById('tipo_lead').value = tipo;
        
        const espec = document.getElementById('campos-especificos');
        const title = document.getElementById('form-title');
        const btn = document.getElementById('btn-text');

        espec.innerHTML = ''; 

        if(tipo === 'donante') {
            title.innerText = 'Registro de Donante';
            espec.innerHTML = `<label>Medicamentos (Nombre y Vencimiento)</label><textarea name="message" rows="3" required></textarea>`;
            btn.innerText = 'Sumarme como Donante';
        } else if(tipo === 'beneficiario') {
            title.innerText = 'Solicitud de Ayuda';
            espec.innerHTML = `<label>¿Qué medicamento buscás?</label><input type="text" name="message" required>`;
            btn.innerText = 'Solicitar Asistencia';
        } else if(tipo === 'farmacia') {
            title.innerText = 'Alianza Institucional';
            espec.innerHTML = `<label>Ubicación / Barrio</label><input type="text" name="message" required>`;
            btn.innerText = 'Postular mi Farmacia';
        }
    }

    async function enviarLead(event) {
        event.preventDefault();
        const btn = document.getElementById('btn-text');
        btn.innerText = 'Procesando...';
        btn.disabled = true;

        const formData = new FormData(event.target);
        const tipo = document.getElementById('tipo_lead').value;

        try {
            const response = await fetch('https://nexofarma.alwaysdata.net/email/procesar_lead.php', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.status === 'success') {
                alert('¡Recibido! Te contactaremos pronto.');
                location.reload();
            } else {
                alert('Error del servidor: ' + result.message);
            }
        } catch (error) {
            alert('Error de conexión.');
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
